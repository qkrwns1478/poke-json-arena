version: '3.8'

services:
  backend:
    image: poke-json-arena-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  frontend:
    image: poke-json-arena-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
    depends_on:
      - backend